<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Página de Login</title>
</head>
<body style="margin:0; padding:0; font-family: Arial; background: linear-gradient(to right, #4facfe, #00f2fe);">

    <div style="
        width: 300px;
        margin: 50px auto;
        padding: 20px;
        background: white;
        border-radius: 10px;
        box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        text-align: center;
    ">
        <h2>Login</h2>

        <form>
            <input 
                type="text" 
                placeholder="Usuário" 
                required
                style="
                    width: 50%;
                    padding: 10px;
                    margin: 10px 0;
                    border-radius: 5px;
                    border: 1px solid #ccc;
                "
            >

            <input 
                type="password" 
                placeholder="Senha" 
                required
                style="
                    width: 50%;
                    padding: 10px;
                    margin: 10px 0;
                    border-radius: 5px;
                    border: 1px solid #ccc;
                "
            >

            <button 
                type="submit"
                style="
                    width: 55%;
                    padding: 10px;
                    margin-top: 10px;
                    background: #4facfe;
                    color: white;
                    border: none;
                    border-radius: 5px;
                    cursor: pointer;
                    font-size: 16px;
                "
            >
               <a href="dashboard.html" class="botao">Entrar</a>
            </button>
        </form>

        <p style="margin-top: 15px;">
            Não tem conta? <a href="#">Criar conta</a>
        </p>
        
    </div>

</body>
</html>
