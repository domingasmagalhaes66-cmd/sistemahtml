<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Controle Financeiro Pessoal</title>
    <link rel="stylesheet" href="../css/style.css">

</head>
<body>
    <h1>Sistema de Controle Financeiro Pessoal</h1>
    <Table>
        <tr>
        <th>Data</th>
        <th>Receita (kz)</th>
        <th>Despesa (kz)</th>
        <th>Saldo (kz)</th>
        </tr>

        <tr>
            <td><input type="date"></td>
            <td><input type="number" class="receita" placeholder="Receita"></td>
            <td><input type="number" class="despesa" placeholder="Despesa"></td>
            <td><input type="number" class="saldo" placeholder="Saldo"></td>
        </tr>

        <tr>
            <td><input type="date"></td>
            <td><input type="number" class="receita"></td>
            <td><input type="number" class="despesa"></td>
            <td><input type="number" class="saldo"></td>
            </tr>

            <tr>
                <td><input type="date"></td>
                <td><input type="number" class="receita"></td>
                <td><input type="number" class="despesa"></td>
                <td><input type="number" class="saldo"></td>
            </tr>

    </Table>
    <p><strong>Nota:</strong> o Saldo deve ser calculado</p>
</body>
</html>
