<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Sistema de controle financeiro pessoal</title>
</head>
<body>

  <h1>Sistema de contole Financeiro Pessoal</h1>
  <div class="cards">
    <div class="card receita">Receitas: <span id="receitas">0</span></div>
    <div class="card despesa">Despesas: <span id="despesas">0</span></div>
    <div class="card saldo">saldo<span id="saldo">0</span></div>

  <div class="meta">
    Meta mensal: <input type="number" id="meta">
    <button>Salvar</button>
  </div>
  <form id="form">
    <input type="text" id="descricao" placeholder="Descrição" required>
    <input type="number" id="valor" placeholder="Valor" required>
    <select id="tipo">
      <option value="receita">Receita</option>
      <option value="despesa">Despesa</option>
    </select>
    <button>Adicionar</button>
  </form>

</div>
<body>
</html>
