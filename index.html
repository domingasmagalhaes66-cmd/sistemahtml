<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bem-vindo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #4CAF50, #2E7D32);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      text-align: center;
    }
    button {
      padding: 10px 20px;
      border: none;
      background: white;
      color: #2E7D32;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Bem-vindo ao Sistema Financeiro</h1>
    <p>Gerencie suas receitas e despesas facilmente</p>
    <button onclick="entrar()">Entrar</button>
  </div>

  <script>
    function entrar() {
      window.location.href = "dashboard.html";
    }
  </script>
</body>
</html>
