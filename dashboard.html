<!DOCTYPE html>
<html>
<head>
    <title>Sistema de Controle Finbanceiro Pessoal</title>
</head>
<body bgcolor="#E6F2FF">

    <h1>Sistema de Controle Financeiro Pessoal</h1>

    <hr>
    <h2>Receitas</h2>

    <table border="1">
        <tr>
            <th>Data</th>
            <th>Descrição</th>
            <th>Valor (Kz)</th>
        </tr>
        <tr>
            <td><input type="date"></td>
            <td><input type="text" placeholder="Ex: Salário"></td>
            <td><input type="number"></td>
        </tr>
        <tr>
            <td><input type="date"></td>
            <td><input type="text"></td>
            <td><input type="number"></td>    
        </tr>
    </table>

    <br>

    <h2>Despesas</h2>

    <table border="1">
        <tr>
            <th>Data</th>
            <th>Descrição</th>
            <th>Valor (Kz)</th>
        </tr>
        <tr>
            <td><input type="date"></td>
            <td><input type="text" placeholder="Ex: Alimentação"></td>
            <td><input type="number"></td>
        </tr>
        <tr>
            <td><input type="date"></td>
            <td><input type="text"></td>
            <td><input type="number"></td>
        </tr>
    </table>

    <br>

  
    <h2>Saldo</h2>

    <p>
        Total de Receitas: _______________________
    </p>

    <p>
        Total de Despesas: _______________________
    </p>

    <p>
        Saldo Final: _______________________
    </p>


    <br>

    <a href="index.html">
        <button>⬅️ Voltar</button>

</html>
